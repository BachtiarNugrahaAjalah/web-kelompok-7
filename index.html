<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="petals">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
        <div class="petal p6"></div>
        <div class="petal p7"></div>
        <div class="petal p8"></div>
    </div>

    <!-- Navbara -->
    <nav class="navbar">
        <span class="nav-brand">🌸 Kelompok 7</span>
        <ul class="nav-links">
            <li><a href="#hero">Beranda</a></li>
            <li><a href="#anggota">Anggota</a></li>
        </ul>
    </nav>
     
    <!-- Hero Section -->
    <section class="hero" id="hero">
        <h1>Halo, <em>Selamat Datang!</em></h1>
        <p>Tujuan dari website ini adalah untuk memperkenalkan anggota kelompok kami.</p>
        <p>Kelompok 7 - Pemrograman Web</p>
        <a href="#anggota" class="btn">Kenalan Yuk →</a>
    </section>

    <!-- Anggota -->
    <section class="anggota" id="anggota">
        <h2>Anggota <em>Kelompok</em></h2>
        
        <div class="grid">
            <!--card 1-->
            <div class="card-wrap">
                <input type="checkbox" id="c1" class="toggle" />
                <label for="c1" class="card">
                    <div class="inner">
                        <div class="front">
                            <div class="avatar av1">
                                <img src="assets/Bachtiar.jpeg" alt="Bachtiar Nugraha" class="av11">
                            </div>
                            <h3>Bachtiar Nugraha</h3>
                            <span class="role">Ketua Kelompok</span>
                            <span class="hint">klik untuk profil</span>
                        </div>
                        <div class="back">
                            <h3>Bachtiar Nugraha</h3>
                            <span class="role">Ketua Kelompok</span>
                            <p>Seorang mahasiswa biasa yang gagal masuk ke universitas impiannya (IPB University jir 😭). 
                                Sekarang berstatus mahasiswa aktif (bayar ukt) di Universitas Lampung di prodi Ilmu Komputer (2417051058). 
                                Hobi lebih cenderung mencari jati diri sambil rebahan dan main game (kadang ngoding kalo mood).</p>
                            <div class="tags">
                                <span>Music</span>
                                <span>Coding</span>
                                <span>Game</span>
                                <span>Ngantuk</span>
                            </div>
                            <span class="hint">klik untuk kembali</span>
                        </div>
                    </div>
                </label>
            </div>

            <!-- card 2 -->
            <div class="card-wrap">
                <input type="checkbox" id="c2" class="toggle" />
                <label for="c2" class="card">
                    <div class="inner">
                        <div class="front">
                            <div class="avatar av2">
                                <img src="assets/Fiki.jpeg" alt="Fiki Sulistiawan" class="av11">
                            </div>
                            <h3>Fiki Sulistiawan</h3>
                            <span class="role">Anggota</span>
                            <span class="hint">klik untuk profil</span>
                        </div>
                        <div class="back">
                            <h3>Fiki Sulistiawan</h3>
                            <span class="role">Anggota</span>
                            <p>Seorang mahasiswa Ilmu Komputer angkatan 2024 di Universitas Lampung dengan NPM 2417051030. Sibuk menjalani hidup dengan cara menikmatinya.
                                Suka traveling, suka main game, suka makan (apa aja), kadang suka "ngoding", dan sesekali nonton anime.
                                Dan ya… dari semua yang saya suka, ada satu yang agak beda. Saya juga suka kamu.</p>
                            <div class="tags">
                                <span>Anime</span>
                                <span>Game</span>
                                <span>Food</span>
                                <span>Coding</span>
                                <span>Traveling</span>
                            </div>
                            <span class="hint">klik untuk kembali</span>
                        </div>
                    </div>
                </label>
            </div>

            <!-- card 3 -->
             <div class="card-wrap">
                <input type="checkbox" id="c3" class="toggle" />
                <label for="c3" class="card">
                    <div class="inner">
                        <div class="front">
                            <div class="avatar av3">
                                <img src="assets/Wisnu.jpeg" alt="Wisnu Wira Winata" class="av11">
                            </div>
                            <h3>Wisnu Wira Winata</h3>
                            <span class="role">Anggota</span>
                            <span class="hint">klik untuk profil</span>
                        </div>
                        <div class="back">
                            <h3>Wisnu Wira Winata</h3>
                            <span class="role">Anggota</span>
                            <p>Mahasiswa Ilmu Komputer dengan NPM 2417051035. Mencari ketenangan dalam banyaknya tugas yang diberikan. 
                                Suka menertawakan hal yang tidak jelas</p>
                            <div class="tags">
                                <span>Rajin Mandi</span>
                                <span>Gymrat</span>
                                <span>Pemalu</span>
                                <span>Ngantuk</span>
                            </div>
                            <span class="hint">klik untuk kembali</span>
                        </div>
                    </div>
                </label>
            </div>

            <!-- card 4 -->
             <div class="card-wrap">
                <input type="checkbox" id="c4" class="toggle" />
                <label for="c4" class="card">
                    <div class="inner">
                        <div class="front">
                            <div class="avatar av4">
                                <img src="assets/Wiyanda.jpg" alt="Wiyanda Savitri" class="av11">
                            </div>
                            <h3>Wiyanda Savitri</h3>
                            <span class="role">Anggota</span>
                            <span class="hint">klik untuk profil</span>
                        </div>
                        <div class="back">
                            <h3>Wiyanda Savitri</h3>
                            <span class="role">Anggota</span>
                            <p>Mahasiswa Ilmu Komputer Universitas Lampung dengan NPM 2457051007. 
                                Fokus pada implementasi dan penyelesaian tugas dengan baik. 
                                Selain itu, suka menonton film dan belajar dari hal baru.</p>
                            <div class="tags">
                                <span>Bersemangat</span>
                                <span>Penonton Film</span>
                                <span>Belajar</span>
                            </div>
                            <span class="hint">klik untuk kembali</span>
                        </div>
                    </div>
                </label>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>Kelompok 7 || © 2026</p>
        <p>All rights reserved.</p>
    </footer>

</body>
</html>
