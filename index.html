<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbara -->
    <nav class="navbar">
        <span class="nav-brand">🌸 Kelompok 8</span>
        <ul class="nav-links">
            <li><a href="#hero">Beranda</a></li>
            <li><a href="#anggota">Anggota</a></li>
        </ul>
    </nav>
     
    <!-- Hero Section -->
    <section class="hero" id="hero">
        <h1>Halo, <em>Selamat Datang!</em></h1>
        <p>Tujuan dari website ini adalah untuk memperkenalkan anggota kelompok kami.</p>
        <ul>
            <li>Kelompok 8</li>
            <li>Mata Kuliah: Pemrograman Web</li>
        </ul>
        <a href="#anggota" class="btn">Kenalan Yuk -></a>
    </section>

    <!-- Anggota -->
    <section class="anggota" id="anggota">
        <h2>Anggota <em>Kelompok</em></h2>
        
        <div class="grid">
            <!--card 1-->
            <div class="card-wrap">
                <input type="checkbox" id="c1" class="toggle" />
                <label for="c1" class="card">
                <div class="inner">
                    <!-- Depan -->
                    <div class="front">
                    <div class="avatar av1">
                        <img src="assets/Bachtiar.jpeg" alt="Fiki" class="av11">
                    </div>
                    <h3>Bachtiar Nugraha</h3>
                    <span class="role">Ketua Kelompok</span>
                    <span class="hint">klik untuk profil</span>
                    </div>
                    <!-- Belakang -->
                    <div class="back">
                    <h3>Bachtiar Nugraha</h3>
                    <span class="role">Ketua Kelompok</span>
                    <p>Bertanggung jawab atas koordinasi tim. Sosok pemimpin yang komunikatif dan selalu memastikan kelompok berjalan sesuai rencana.</p>
                    <div class="tags">
                        <span>Pemimpin</span>
                        <span>Komunikatif</span>
                        <span>Terorganisir</span>
                    </div>
                    <span class="hint">klik untuk kembali</span>
                    </div>
                </div>
                </label>
            </div>

            <!-- card 2 -->

            <div class="card-wrap">
                <input type="checkbox" id="c2" class="toggle" />
                <label for="c2" class="card">
                <div class="inner">
                    <div class="front">
                    <div class="avatar av2">
                        <img src="assets/Fiki.jpeg" alt="Baktisr" class="av11">
                    </div>
                    <h3>Fiki Sulistiawan</h3>
                    <span class="role">Anggota</span>
                    <span class="hint">klik untuk profil</span>
                    </div>
                    <div class="back">
                    <h3>Fiki Sulistiawan</h3>
                    <span class="role">Anggota</span>
                    <p>Seorang mahasiswa Ilmu Komputer angkatan 2024 di Universitas Lampung dengan NPM 2417051030. Sibuk menjalani hidup dengan cara menikmatinya.
                        Suka traveling, suka main game, suka makan (apa aja), kadang suka "ngoding", dan sesekali nonton anime.
                        Dan ya… dari semua yang saya suka, ada satu yang agak beda. Saya juga suka kamu.</p>
                    <div class="tags">
                        <span>Anime</span>
                        <span>Game</span>
                        <span>Food</span>
                        <span>Coding</span>
                        <span>Traveling</span>
                    </div>
                    <span class="hint">klik untuk kembali</span>
                    </div>
                </div>
                </label>
            </div>

            <!-- card 3 -->
             <div class="card-wrap">
                <input type="checkbox" id="c3" class="toggle" />
                <label for="c3" class="card">
                <div class="inner">
                    <div class="front">
                    <div class="avatar av3">
                        <img src="assets/Wisnu.jpeg" alt="Wisnu" class="av11">
                    </div>
                    <h3>Wisnu Wira Winata</h3>
                    <span class="role">Anggota</span>
                    <span class="hint">klik untuk profil</span>
                    </div>
                    <div class="back">
                    <h3>Wisnu Wira Winata</h3>
                    <span class="role">Anggota</span>
                    <p>Aktif dalam pengembangan ide dan penelitian. Selalu hadir dengan solusi kreatif dan inovatif untuk setiap permasalahan kelompok.</p>
                    <div class="tags">
                        <span>Inovatif</span>
                        <span>Sigma Ohio lv 99</span>
                        <span>Proaktif</span>
                    </div>
                    <span class="hint">klik untuk kembali</span>
                    </div>
                </div>
                </label>
            </div>

            <!-- card 4 -->
             <div class="card-wrap">
                <input type="checkbox" id="c4" class="toggle" />
                <label for="c4" class="card">
                <div class="inner">
                    <div class="front">
                    <div class="avatar av4">
                        <img src="assets/IMG-20241009-WA0065.jpg" alt="Wiyanda" class="av11">
                    </div>
                    <h3>Wiyanda Savitri</h3>
                    <span class="role">Anggota</span>
                    <span class="hint">klik untuk profil</span>
                    </div>
                    <div class="back">
                    <h3>Wiyanda Savitri</h3>
                    <span class="role">Anggota</span>
                    <p>Fokus pada implementasi dan eksekusi tugas dengan penuh semangat. Pekerja keras dengan dedikasi tinggi dalam setiap kontribusi kelompok.</p>
                    <div class="tags">
                        <span>Bersemangat</span>
                        <span>Pekerja Keras</span>
                        <span>Adaptif</span>
                    </div>
                    <span class="hint">klik untuk kembali</span>
                    </div>
                </div>
                </label>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>Kelompok 8 || © 2026</p>
        <p>All rights reserved.</p>
    </footer>

</body>
</html>
